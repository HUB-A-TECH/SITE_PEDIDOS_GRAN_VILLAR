services:
  db:
    image: postgres:16-alpine
    container_name: granvillar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: granvillar
      POSTGRES_PASSWORD: granvillar
      POSTGRES_DB: granvillar
    ports:
      - "5432:5432"
    volumes:
      - granvillar_pgdata:/var/lib/postgresql/data

volumes:
  granvillar_pgdata:
